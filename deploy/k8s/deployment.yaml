apiVersion: apps/v1
kind: Deployment
metadata:
  name: cognispace
  labels:
    app: cognispace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cognispace
  template:
    metadata:
      labels:
        app: cognispace
    spec:
      containers:
        - name: cognispace
          image: ghcr.io/skyyware/cognispace:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
